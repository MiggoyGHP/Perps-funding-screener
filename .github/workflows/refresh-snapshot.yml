# OPTIONAL: keeps the published GitHub Pages snapshot fresh automatically.
# Delete this file if you prefer to refresh manually (run each command and
# check it succeeded before the next — see README "Publish to GitHub Pages"):
#   node scripts/fetch-snapshot.mjs
#   git commit -am "snapshot"
#   git push
#
# Geo reality (verified 2026-07-05): GitHub-hosted runners are US-region.
# From there Hyperliquid is reachable, but Binance fapi returns 451 and Bybit
# returns 403 (api.bytick.com included). CI captures therefore carry
# Binance/Bybit rates via Hyperliquid's predictedFundings echo, flagged as
# such in the UI. fetch-snapshot.mjs refuses to overwrite a complete,
# still-fresh (<24h) snapshot with a more-degraded capture; data/history.json
# accrues on every run either way. A locally generated snapshot (from a
# network that reaches all venues) stays the gold copy for up to 24h.
name: Refresh funding snapshot

on:
  schedule:
    - cron: '17 * * * *' # hourly (off the top of the hour, politely) — the page
                         # quotes predicted next-settlement rates and Hyperliquid
                         # settles hourly, so anything slower is stale on arrival
  workflow_dispatch: {}     # manual "Run workflow" button

permissions:
  contents: write

# A manual dispatch must not overlap an in-flight cron run.
concurrency:
  group: refresh-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Fetch snapshot
        run: node scripts/fetch-snapshot.mjs
      - name: Commit if changed
        run: |
          git config user.name "snapshot-bot"
          git config user.email "actions@github.com"
          # --cached after add: history.json is untracked on its first run,
          # and plain `git diff` cannot see untracked files.
          git add data/snapshot.json data/history.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: refresh funding snapshot"
            # Rebase over anything pushed while this job ran (code pushes,
            # manual snapshot commits) so the push is never non-fast-forward.
            git pull --rebase origin "$GITHUB_REF_NAME"
            for i in 1 2; do git push && break; git pull --rebase origin "$GITHUB_REF_NAME"; done
            git push  # final attempt outside the loop so a failure fails the step (no-op if already pushed)
          else
            echo "No changes."
          fi
